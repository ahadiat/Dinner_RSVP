<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bayaran Dinner FEPDT</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:14px;
    background:#0066ff;
    color:white;
    border:none;
    cursor:pointer;
}

#status{
    margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

<h2>Bayaran Dinner FEPDT</h2>

<form id="paymentForm">

<label>Nama</label>
<input
type="text"
id="nama"
required>

<label>Kategori</label>
<select id="kategori">

<option>Pelajar</option>
<option>Alumni</option>
<option>Pensyarah</option>
<option>Lain-lain</option>

</select>

<label>No Matrik</label>
<input
type="text"
id="matrik">

<label>Upload Resit</label>
<input
type="file"
id="receipt"
required>

<button type="submit">
Hantar
</button>

</form>

<div id="status"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbx1M-SaNZkM3TQ_8GFbgOZ97x0JkqbryJ03Acy7Sdyglbhy-Rg0JQYwRVnHEorEBzo4HQ/exec";

document
.getElementById("paymentForm")
.addEventListener(
"submit",
async function(e){

e.preventDefault();

const file =
document
.getElementById("receipt")
.files[0];

if(!file){
alert("Sila upload resit");
return;
}

const reader =
new FileReader();

reader.onload = async function(){

const base64 =
reader.result
.split(",")[1];

const payload = {

nama:
document
.getElementById("nama")
.value,

kategori:
document
.getElementById("kategori")
.value,

matrik:
document
.getElementById("matrik")
.value,

fileName:
file.name,

mimeType:
file.type,

file:
base64

};

document
.getElementById("status")
.innerHTML =
"Sedang memuat naik...";

try{

const response =
await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(payload)

});

const result =
await response.json();

if(result.success){

document
.getElementById("status")
.innerHTML =
`
✅ Bayaran berjaya direkodkan.
`;

document
.getElementById("paymentForm")
.reset();

}else{

document
.getElementById("status")
.innerHTML =
result.error;

}

}catch(err){

document
.getElementById("status")
.innerHTML =
err;

}

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>
